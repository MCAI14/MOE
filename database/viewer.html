<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; padding:2rem; }
    pre { background:#f0f0f0; padding:1rem; border-radius:6px; overflow:auto; }
    a.back { display:inline-block; margin-bottom:1rem; color:#667eea; text-decoration:none; }
  </style>
</head>
<body>
  <a href="index.html" class="back">← Back to explorer</a>
  <h1 id="filename">Loading...</h1>
  <div id="content">
    <pre id="filedata">Fetching file...</pre>
  </div>

  <script>
    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    const fileUrl = getParam('file');
    const name = getParam('name') || fileUrl;
    document.getElementById('filename').textContent = name;

    if (fileUrl) {
      fetch(fileUrl)
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(text => {
          document.getElementById('filedata').textContent = text;
        })
        .catch(e => {
          document.getElementById('filedata').textContent = 'Error loading file: ' + e.message;
        });
    } else {
      document.getElementById('filedata').textContent = 'No file specified.';
    }
  </script>
</body>
</html>
