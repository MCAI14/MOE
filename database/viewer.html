<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; padding:2rem; }
    pre { background:#f0f0f0; padding:1rem; border-radius:6px; overflow:auto; }
    a.back { display:inline-block; margin-bottom:1rem; color:#667eea; text-decoration:none; }
  </style>
  <script src="auth.js"></script>
</head>
<body>
  <a href="index.html" class="back">← Back to explorer</a>
  <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
    <h1 id="filename" style="margin:0;">Loading...</h1>
    <div style="text-align:right;">
      <div id="file-meta" style="font-size:0.85rem; color:#555; margin-bottom:0.25rem;"></div>
      <div id="file-actions" style="font-size:0.9rem;"></div>
    </div>
  </div>
  <div id="content">
    <div id="viewer">
      <pre id="filedata">Fetching file...</pre>
    </div>
  </div>

  <script>
    async function init() {
      function getParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      const fileUrl = getParam('file');
      const decodedFileUrl = fileUrl ? decodeURIComponent(fileUrl) : fileUrl;
      const name = getParam('name') || decodedFileUrl;
      document.getElementById('filename').textContent = name;

      const viewer = document.getElementById('viewer');
      const filedata = document.getElementById('filedata');
      const actions = document.getElementById('file-actions');
      const meta = document.getElementById('file-meta');

      function formatBytes(bytes) {
        if (!bytes || bytes <= 0) return 'n/a';
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        let idx = 0;
        let value = bytes;
        while (value >= 1024 && idx < units.length - 1) {
          value /= 1024;
          idx += 1;
        }
        return `${value.toFixed(1)} ${units[idx]}`;
      }

      function setMeta(contentType, size) {
        const parts = [];
        if (contentType) parts.push(`Type: <strong>${contentType}</strong>`);
        if (size != null && !isNaN(size)) parts.push(`Size: <strong>${formatBytes(size)}</strong>`);
        meta.innerHTML = parts.length ? parts.join(' • ') : '';
      }

      function setActions(url) {
        actions.innerHTML = `<a href="${url}" target="_blank" rel="noopener" style="color:#667eea;">Open raw</a> | <a href="${url}" download style="color:#667eea;">Download</a>`;
      }

      function showError(message) {
        viewer.innerHTML = `<p style="color: #b00;">${message}</p>`;
      }

      function getFileExtension(name) {
        if (!name) return '';
        const idx = name.lastIndexOf('.');
        return idx !== -1 ? name.slice(idx + 1).toLowerCase() : '';
      }

      function showText(text) {
        filedata.textContent = text;
        filedata.style.display = 'block';
      }

      function showUrlRedirect(text) {
        let targetUrl = '';
        const urlMatch = text.match(/^(?:URL|url)\s*=\s*(.+)$/im);
        if (urlMatch) targetUrl = urlMatch[1].trim();

        if (!targetUrl) {
          showError('Invalid .url file: URL not found.');
          return;
        }

        viewer.innerHTML = `<p>Redirecting to <a href="${targetUrl}" target="_blank" rel="noopener">${targetUrl}</a>...</p>`;
        setTimeout(() => {
          window.location.href = targetUrl;
        }, 800);
      }

      function showImage(blob) {
        const url = URL.createObjectURL(blob);
        viewer.innerHTML = `<img src="${url}" style="max-width:100%; height:auto; border-radius:8px;" />`;
      }

      function showAudio(blob) {
        const url = URL.createObjectURL(blob);
        viewer.innerHTML = `<audio controls style="width:100%;"><source src="${url}"></audio>`;
      }

      function showVideo(blob) {
        const url = URL.createObjectURL(blob);
        viewer.innerHTML = `<video controls style="width:100%; max-height:80vh;"><source src="${url}"></video>`;
      }

      function showPDF(blob) {
        const url = URL.createObjectURL(blob);
        viewer.innerHTML = `<iframe src="${url}" style="width:100%; height:80vh; border:none;"></iframe>`;
      }

      function showDocument(url) {
        const googleUrl = `https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(url)}`;
        viewer.innerHTML = `
          <p>Preview not supported in-browser for .docx. Use 'Open raw' or 'Download'.</p>
          <p><a href="${googleUrl}" target="_blank" rel="noopener" style="color:#667eea;">Open with Google Docs Viewer (if allowed)</a></p>
          <iframe src="${googleUrl}" style="width:100%; height:80vh; border:1px solid #ccc;"></iframe>
        `;
      }

      function showHTML(text) {
        const blob = new Blob([text], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        viewer.innerHTML = `<iframe src="${url}" style="width:100%; height:80vh; border:none;"></iframe>`;
      }

      if (decodedFileUrl) {
        setActions(decodedFileUrl);
        fetch(decodedFileUrl)
          .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const contentType = r.headers.get('content-type') || '';
            const lengthHeader = r.headers.get('content-length');
            const size = lengthHeader ? parseInt(lengthHeader, 10) : null;
            setMeta(contentType, size);

            if (contentType.startsWith('image/')) {
              return r.blob().then(blob => {
                setMeta(contentType, blob.size); // prefer actual blob size
                showImage(blob);
              });
            }

            if (contentType.startsWith('audio/')) {
              return r.blob().then(blob => {
                setMeta(contentType, blob.size);
                showAudio(blob);
              });
            }

            if (contentType.startsWith('video/')) {
              return r.blob().then(blob => {
                setMeta(contentType, blob.size);
                showVideo(blob);
              });
            }

            const extension = getFileExtension(name);

            if (extension === 'url') {
              return r.text().then(text => {
                setMeta(contentType, new TextEncoder().encode(text).length);
                showUrlRedirect(text);
              });
            }

            if (extension === 'docx') {
              // Most browsers cannot render docx directly. Use Office online viewer if publicly accessible.
              showDocument(decodedFileUrl);
              return;
            }

            if (contentType === 'application/pdf') {
              return r.blob().then(blob => {
                setMeta(contentType, blob.size);
                showPDF(blob);
              });
            }

            if (contentType === 'text/html' || extension === 'html' || extension === 'htm') {
              return r.text().then(text => {
                setMeta(contentType, new TextEncoder().encode(text).length);
                showHTML(text);
              });
            }

            return r.text().then(text => {
              setMeta(contentType, new TextEncoder().encode(text).length);
              showText(text);
            });
          })
          .catch(e => {
            showError('Error loading file: ' + e.message);
          });
      } else {
        showError('No file specified.');
      }
    }

    requireDatabaseAuth().then(init).catch(console.error);
  </script>
</body>
</html>
