<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Database Explorer — MM50I Admin</title>

  <!-- Font & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #f5f5f5;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #2f3c4f;
      color: white;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      margin-bottom: 1rem;
      font-size: 1.25rem;
    }

    .collection-list {
      list-style: none;
      padding: 0;
      margin: 0;
      flex: 1;
      overflow-y: auto;
    }

    .collection-list li {
      margin: 0.5rem 0;
    }

    .collection-list a {
      color: #cbd5e0;
      text-decoration: none;
      display: block;
      padding: 0.5rem;
      border-radius: 4px;
    }

    .collection-list a.active,
    .collection-list a:hover {
      background: #3a4a5f;
      color: white;
    }

    .content {
      flex: 1;
      padding: 1rem 2rem;
      overflow-y: auto;
    }

    .content h2 {
      margin-top: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    table th,
    table td {
      text-align: left;
      padding: 0.75rem;
      border-bottom: 1px solid #ddd;
      word-break: break-word;
    }

    .alert {
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
    }

    .alert.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .loader {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top: 3px solid #2f3c4f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Explorer</h2>
    <ul class="collection-list">
      <li><a href="#" data-action="root">Home</a></li>
      <li><a href="#" data-action="refresh">Refresh</a></li>
    </ul>
  </div>

  <div class="content">
    <h2 id="collection-title">Loading…</h2>
    <div id="breadcrumbs" style="margin: 0.5rem 0 1rem; color: #555; font-size: 0.9rem;"></div>
    <div id="alert" class="alert error" style="display:none;"></div>
    <div id="loader" style="display:none;"><span class="loader"></span>Loading...</div>
    <div id="data-table"></div>
  </div>

  <script src="auth.js"></script>
  <script>
    const DEFAULT_PATH = ''; // root of the repo
    const API_BASE = '/.netlify/functions/github-files';

    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    async function init() {
      const titleEl = document.getElementById('collection-title');
      const breadcrumbEl = document.getElementById('breadcrumbs');
      const alertEl = document.getElementById('alert');
      const loaderEl = document.getElementById('loader');
      const tableContainer = document.getElementById('data-table');

      const rootLink = document.querySelector('[data-action="root"]');
      const refreshLink = document.querySelector('[data-action="refresh"]');

      let currentPath = getParam('path') || DEFAULT_PATH;

      rootLink.addEventListener('click', (e) => {
        e.preventDefault();
        loadPath(DEFAULT_PATH);
      });

      refreshLink.addEventListener('click', (e) => {
        e.preventDefault();
        loadPath(currentPath);
      });

      function showAlert(message) {
        alertEl.textContent = message;
        alertEl.style.display = 'block';
      }

      function hideAlert() {
        alertEl.style.display = 'none';
      }

      function showLoader() {
        loaderEl.style.display = 'inline-block';
      }

      function hideLoader() {
        loaderEl.style.display = 'none';
      }

      function makeBreadcrumbs(path) {
        const parts = path ? path.split('/').filter(Boolean) : [];
        if (parts.length === 0) {
          breadcrumbEl.textContent = 'Root';
          return;
        }

        const fragments = [];
        let accum = '';
        fragments.push(`<a href="#" data-path="">Root</a>`);
        for (const part of parts) {
          accum = accum ? `${accum}/${part}` : part;
          fragments.push(`<a href="#" data-path="${accum}">${part}</a>`);
        }

        breadcrumbEl.innerHTML = fragments.join(' / ');
        breadcrumbEl.querySelectorAll('a').forEach(a => {
          a.addEventListener('click', (e) => {
            e.preventDefault();
            const p = a.getAttribute('data-path');
            loadPath(p);
          });
        });
      }

      function renderTable(items, basePath) {
        if (!items || items.length === 0) {
          tableContainer.innerHTML = '<p>No items found.</p>';
          return;
        }

        let html = '<table><thead><tr><th>Name</th><th>Type</th><th>Action</th></tr></thead><tbody>';

        items.forEach(item => {
          const isDir = Array.isArray(item.children);
          const name = item.name || '(unknown)';
          const type = isDir ? 'folder' : 'file';

          html += '<tr>';
          html += `<td>${name}</td>`;
          html += `<td>${type}</td>`;

          if (isDir) {
            const nextPath = basePath ? `${basePath}/${name}` : name;
            html += `<td><a href="#" data-path="${nextPath}">open</a></td>`;
          } else {
            const encoded = encodeURIComponent(item.url);
            const encodedName = encodeURIComponent(name);
            html += `<td><a href="viewer.html?file=${encoded}&name=${encodedName}" target="_blank">view</a></td>`;
          }

          html += '</tr>';
        });

        html += '</tbody></table>';
        tableContainer.innerHTML = html;

        // attach folder click handlers
        tableContainer.querySelectorAll('a[data-path]').forEach(a => {
          a.addEventListener('click', (e) => {
            e.preventDefault();
            loadPath(a.getAttribute('data-path'));
          });
        });
      }

      async function loadPath(path) {
        hideAlert();
        showLoader();
        tableContainer.innerHTML = '';
        titleEl.textContent = path || 'Root';
        makeBreadcrumbs(path);
        currentPath = path;

        try {
          const resp = await fetch(`${API_BASE}?path=${encodeURIComponent(path)}`);
          if (!resp.ok) {
            const body = await resp.text().catch(() => '');
            throw new Error(`GitHub proxy error ${resp.status}: ${body}`);
          }
          const list = await resp.json();
          renderTable(list, path);
        } catch (e) {
          console.error(e);
          showAlert('Error loading data: ' + e.message);
        } finally {
          hideLoader();
        }
      }

      loadPath(currentPath);
    }

    requireDatabaseAuth().then(init).catch(console.error);
  </script>
</body>
</html>
